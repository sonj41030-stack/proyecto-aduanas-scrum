<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Menores de Edad</title>
        <style>
        *{box-sizing:border-box;font-family:Segoe UI,sans-serif}body{margin:0;background:#f4f6f9;display:flex}
        .sidebar{width:250px;background:#0a3d6b;color:#fff;min-height:100vh;padding:20px}
.sidebar a{display:block;color:#fff;text-decoration:none;padding:10px 0}
.main{flex:1;padding:20px}.top{background:#fff;padding:15px;border-radius:10px;margin-bottom:20px;display:flex;justify-content:space-between}
.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
label{font-weight:600;font-size:14px}input,select{width:100%;padding:10px;margin-top:5px}
button{background:#0a3d6b;color:#fff;border:0;padding:12px 18px;border-radius:8px;cursor:pointer}
table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #ddd;padding:10px;text-align:left}
.btn-contraste{background:#f0a500;color:#000}.alto{background:#000}.alto .card,.alto .top{border:2px solid #000}
@media(max-width:700px){body{display:block}.sidebar{width:100%;min-height:auto}.grid{grid-template-columns:1fr}}
</style></head>
<body>
<div class="sidebar">
<h2>Sistema Aduanero</h2>
<a href="panel.html">🏠 Panel</a>
<a href="vehiculos.html">🚗 Vehículos</a>
<a href="menores.html"><b>👶 Menores</b></a>
<a href="sag.html">🌿 SAG</a>
</div>
<div class="main">
<div class="top"><h2>Registro de Menores</h2><button class="btn-contraste" onclick="document.body.classList.toggle('alto')">👁 Alto contraste</button></div>
<div class="card">
<h3>Registrar salida</h3>
<div class="grid">
<div><label>Nombre completo</label><input id="nombre"></div>
<div><label>Fecha nacimiento</label><input type="date" id="nac"></div>
<div><label>Documento</label><input id="doc"></div>
<div><label>Nacionalidad</label><input id="nacio"></div>
<div><label>Destino</label><select id="dest"><option>Argentina</option><option>Perú</option><option>Bolivia</option><option>Otro</option></select></div>
<div><label>Fecha salida</label><input type="date" id="sal"></div>
<div><label>Acompañante</label><select id="acom"><option>Ambos padres</option><option>Madre</option><option>Padre</option><option>Tutor legal</option><option>Otro adulto</option><option>Viaja solo</option></select></div>
<div><label>Autorización notarial</label><select id="aut"><option>Sí</option><option>No</option></select></div>
</div><br>
<button onclick="guardar()">Registrar menor</button>
<p id="msg"></p>
</div>
<div class="card">
<h3>Menores registrados</h3>
<table><thead><tr><th>Nombre</th><th>Destino</th><th>Salida</th><th>Acompañante</th><th>Acción</th></tr></thead><tbody id="tb"></tbody></table>
</div>
</div>
<script>
function cargar(){
let d=JSON.parse(localStorage.getItem('menores')||'[]'),tb=document.getElementById('tb');tb.innerHTML='';
d.forEach((x,i)=>tb.innerHTML+=`<tr><td>${x.n}</td><td>${x.des}</td><td>${x.s}</td><td>${x.a}</td><td><button onclick="del(${i})">Eliminar</button></td></tr>`);
}
function guardar(){
let n=nombre.value.trim(),docv=doc.value.trim(),s=sal.value;
if(!n||!docv||!s){msg.textContent='Complete los campos obligatorios';msg.style.color='red';return;}
if(acom.value!='Ambos padres'&&aut.value=='No'){msg.textContent='Se requiere autorización notarial';msg.style.color='red';return;}
let d=JSON.parse(localStorage.getItem('menores')||'[]');
d.push({n:n,des:dest.value,s:s,a:acom.value});
localStorage.setItem('menores',JSON.stringify(d));
msg.textContent='Registro exitoso';msg.style.color='green';
document.querySelectorAll('input').forEach(i=>i.value='');
cargar();
}
function del(i){let d=JSON.parse(localStorage.getItem('menores')||'[]');d.splice(i,1);localStorage.setItem('menores',JSON.stringify(d));cargar();}
cargar();
</script>
</body></html>
