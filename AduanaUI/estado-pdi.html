<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Estado PDI</title><style>
*{box-sizing:border-box;font-family:Segoe UI,sans-serif}body{margin:0;background:#f4f6f9;display:flex}.side{width:250px;background:#0a3d6b;color:#fff;min-height:100vh;padding:20px}.side a{display:block;color:#fff;text-decoration:none;padding:10px 0}.main{flex:1;padding:20px}.top,.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px}.top{display:flex;justify-content:space-between}.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}input,select{width:100%;padding:10px}button{background:#0a3d6b;color:#fff;border:0;padding:10px 18px;border-radius:8px;cursor:pointer}.estado{font-size:22px;font-weight:bold;margin-top:20px}.ok{color:#198754}.obs{color:#b85c00}.bloq{color:#c0392b}.alto{background:#000}.alto .top,.alto .card{border:2px solid #000}@media(max-width:700px){body{display:block}.side{width:100%;min-height:auto}.grid{grid-template-columns:1fr}}
</style></head><body>
<div class="side"><h2>Sistema Aduanero</h2>
<a href="panel.html">🏠 Panel</a>
<a href="vehiculos.html">🚗 Vehículos</a>
<a href="menores.html">👶 Menores</a>
<a href="sag.html">🌿 SAG</a>
<a href="dashboard.html">📊 Dashboard</a>
<a href="mis-tramites.html">📋 Mis Trámites</a>
<a href="estado-pdi.html"><b>🛡 Estado PDI</b></a>
</div>
<div class="main">
<div class="top"><h2>Consulta Estado PDI</h2><button onclick="document.body.classList.toggle('alto')">👁 Alto contraste</button></div>
<div class="card">
<div class="grid">
<div><label>Nombre</label><input id="nom"></div>
<div><label>RUN/Pasaporte</label><input id="doc"></div>
<div><label>Estado</label><select id="est"><option>Habilitado para viajar</option><option>Observaciones pendientes</option><option>Salida bloqueada</option></select></div>
<div><label>Fecha consulta</label><input type="date" id="fec"></div>
</div><br>
<button onclick="consultar()">Consultar</button>
<div id="resultado" class="estado"></div>
</div>
</div>
<script>
function consultar(){
 if(!nom.value||!doc.value||!fec.value){resultado.innerHTML="Complete todos los datos.";resultado.className="estado bloq";return;}
 if(est.value=="Habilitado para viajar"){resultado.innerHTML="🟢 Habilitado para salir del país.";resultado.className="estado ok";}
 else if(est.value=="Observaciones pendientes"){resultado.innerHTML="🟡 Existen observaciones pendientes.";resultado.className="estado obs";}
 else{resultado.innerHTML="🔴 Salida bloqueada. Debe regularizar su situación.";resultado.className="estado bloq";}
}
</script>
</body></html>
