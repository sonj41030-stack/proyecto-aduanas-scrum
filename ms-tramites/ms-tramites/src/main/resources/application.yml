server:
  port: 8083

spring:
  application:
    name: aduana-vehiculos-service
  datasource:
    url: jdbc:mysql://localhost:3306/aduana_vehiculos?createDatabaseIfNotExist=true&serverTimezone=America/Santiago
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
